# Kubernetes deployment for SecureCode AI

apiVersion: v1
kind: Service
metadata:
  name: securecode-api
  labels:
    app: securecode-api
spec:
  ports:
    - port: 8000
      targetPort: 8000
      protocol: TCP
  selector:
    app: securecode-api
  type: ClusterIP

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: securecode-api
  labels:
    app: securecode-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: securecode-api
  template:
    metadata:
      labels:
        app: securecode-api
    spec:
      containers:
        - name: api
          image: securecode-ai:latest
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: securecode-secrets
                  key: database-url
            - name: REDIS_URL
              valueFrom:
                configMapKeyRef:
                  name: securecode-config
                  key: redis-url
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: securecode-web
  labels:
    app: securecode-web
spec:
  ports:
    - port: 3000
      targetPort: 3000
      protocol: TCP
  selector:
    app: securecode-web
  type: LoadBalancer

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: securecode-web
  labels:
    app: securecode-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: securecode-web
  template:
    metadata:
      labels:
        app: securecode-web
    spec:
      containers:
        - name: web
          image: securecode-ai-web:latest
          ports:
            - containerPort: 3000
          env:
            - name: VITE_API_URL
              value: "http://securecode-api:8000"
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"